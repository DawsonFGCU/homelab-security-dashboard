<svg xmlns="http://www.w3.org/2000/svg" width="680" viewBox="0 0 680 566" role="img" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
<title>Homelab security dashboard architecture</title>
<desc>Public visitors reach the dashboard through a Cloudflare Tunnel and private admin access runs over a Tailscale WireGuard VPN. Both enter a Lenovo ThinkPad running Ubuntu, where Nginx reverse-proxies to an internal FastAPI backend that reads system metrics, security logs, and a local AI model.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<rect x="90" y="46" width="200" height="46" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="190" y="68" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">Public visitor</text>
<text x="190" y="84" text-anchor="middle" font-size="12" fill="#5F5E5A">recruiter · demo</text>

<rect x="390" y="46" width="200" height="46" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="490" y="68" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">Private admin</text>
<text x="490" y="84" text-anchor="middle" font-size="12" fill="#5F5E5A">you</text>

<line x1="190" y1="92" x2="190" y2="130" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="490" y1="92" x2="490" y2="130" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="90" y="132" width="200" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="190" y="155" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">Cloudflare Tunnel</text>
<text x="190" y="172" text-anchor="middle" font-size="12" fill="#0F6E56">HTTPS · public</text>

<rect x="390" y="132" width="200" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="490" y="155" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">Tailscale VPN</text>
<text x="490" y="172" text-anchor="middle" font-size="12" fill="#0F6E56">WireGuard · private</text>

<rect x="45" y="212" width="590" height="300" rx="12" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 4"/>
<text x="62" y="232" font-size="12" fill="#5F5E5A">Lenovo ThinkPad · Ubuntu Server</text>

<line x1="190" y1="184" x2="305" y2="256" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="490" y1="184" x2="375" y2="256" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="240" y="256" width="200" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="279" text-anchor="middle" font-size="14" font-weight="500" fill="#26215C">Nginx reverse proxy</text>
<text x="340" y="296" text-anchor="middle" font-size="12" fill="#534AB7">single entry · port 80</text>

<line x1="340" y1="308" x2="340" y2="344" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="240" y="346" width="200" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="369" text-anchor="middle" font-size="14" font-weight="500" fill="#26215C">FastAPI backend</text>
<text x="340" y="386" text-anchor="middle" font-size="12" fill="#534AB7">Uvicorn · internal only</text>

<line x1="340" y1="398" x2="160" y2="440" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="340" y1="398" x2="340" y2="440" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="340" y1="398" x2="520" y2="440" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="85" y="442" width="150" height="52" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="160" y="465" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">psutil</text>
<text x="160" y="482" text-anchor="middle" font-size="12" fill="#5F5E5A">system metrics</text>

<rect x="265" y="442" width="150" height="52" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="340" y="465" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">Security logs</text>
<text x="340" y="482" text-anchor="middle" font-size="12" fill="#5F5E5A">journald · fail2ban</text>

<rect x="445" y="442" width="150" height="52" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="520" y="465" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">Ollama</text>
<text x="520" y="482" text-anchor="middle" font-size="12" fill="#5F5E5A">local AI model</text>

<rect x="90" y="532" width="12" height="12" rx="3" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="108" y="542" font-size="12" fill="#5F5E5A">Encrypted transport</text>
<rect x="270" y="532" width="12" height="12" rx="3" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="288" y="542" font-size="12" fill="#5F5E5A">Application layer</text>
<rect x="430" y="532" width="12" height="12" rx="3" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="448" y="542" font-size="12" fill="#5F5E5A">Access · system</text>
</svg>